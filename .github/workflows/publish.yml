name: Publicar pacotes NuGet

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore FCG.Shared.slnx

      - name: Build
        run: dotnet build FCG.Shared.slnx --configuration Release --no-restore

      - name: Pack FCG.Shared.Domain
        run: dotnet pack src/FCG.Shared.Domain/FCG.Shared.Domain.csproj --configuration Release --no-build --output ./nupkgs

      - name: Pack FCG.Shared.Infrastructure
        run: dotnet pack src/FCG.Shared.Infrastructure/FCG.Shared.Infrastructure.csproj --configuration Release --no-build --output ./nupkgs

      - name: Publicar no GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://nuget.pkg.github.com/11NETTG30/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
