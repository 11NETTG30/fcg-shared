name: Publicar FCG.Shared.Domain

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore src/FCG.Shared.Domain/FCG.Shared.Domain.csproj

      - name: Build
        run: dotnet build src/FCG.Shared.Domain/FCG.Shared.Domain.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/FCG.Shared.Domain/FCG.Shared.Domain.csproj --configuration Release --no-build --output ./nupkgs

      - name: Publicar no GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://nuget.pkg.github.com/11NETTG30/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
